name: Release notarized macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag, for example v0.1.0
        required: true
        type: string
      publish_release:
        description: Publish the signed files to GitHub Releases
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: macos-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, sign, and notarize universal DMG
    runs-on: macos-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL }}
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VITE_SUPABASE_URL" || { echo "::error::Missing repository variable VITE_SUPABASE_URL"; exit 1; }
          test -n "$VITE_SUPABASE_ANON_KEY" || { echo "::error::Missing repository variable VITE_SUPABASE_ANON_KEY"; exit 1; }
          test -n "$VITE_PUBLIC_APP_URL" || { echo "::error::Missing repository variable VITE_PUBLIC_APP_URL"; exit 1; }
          test -n "$CSC_LINK" || { echo "::error::Missing secret MACOS_CERTIFICATE_P12"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "::error::Missing secret MACOS_CERTIFICATE_PASSWORD"; exit 1; }
          test -n "$APPLE_API_KEY_ID" || { echo "::error::Missing secret APPLE_API_KEY_ID"; exit 1; }
          test -n "$APPLE_API_ISSUER" || { echo "::error::Missing secret APPLE_API_ISSUER"; exit 1; }
          test -n "$APPLE_API_KEY_P8" || { echo "::error::Missing secret APPLE_API_KEY_P8"; exit 1; }
          [[ "${{ inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::release_tag must look like v0.1.0"
            exit 1
          }

      - name: Prepare Apple notarization key
        shell: bash
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build web app
        run: pnpm build

      - name: Build, sign, and notarize universal app
        run: pnpm exec electron-builder --mac dmg zip --universal --publish never

      - name: Notarize and staple DMG container
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(release/*.dmg)
          (( ${#dmgs[@]} > 0 )) || { echo "::error::A DMG was not produced"; exit 1; }
          for dmg_path in "${dmgs[@]}"; do
            xcrun notarytool submit "$dmg_path" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg_path"
          done

      - name: Verify signatures and Gatekeeper assessment
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find release -maxdepth 2 -type d -name 'InterAct.app' -print -quit)"
          dmg_path="$(find release -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$app_path" || { echo "::error::InterAct.app was not produced"; exit 1; }
          test -n "$dmg_path" || { echo "::error::A DMG was not produced"; exit 1; }
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"

      - name: Create SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shasum -a 256 ./*.dmg ./*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterAct-macOS-${{ inputs.release_tag }}
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          files=(release/*.dmg release/*.zip release/SHA256SUMS.txt)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --title "InterAct $RELEASE_TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
